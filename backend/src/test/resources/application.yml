spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:h2:mem:openclaw_news;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

worker:
  base-url: http://localhost:13501

api:
  read-protection-enabled: false
  read-key:
  requests-per-minute: 60

operations:
  collect-enabled: false
  summary-enabled: false
  telegram-send-enabled: false
  schedule-enabled: false
  briefing-cron: 0 0 8 * * *
  briefing-zone: Asia/Seoul
