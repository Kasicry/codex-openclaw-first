spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:13532/openclaw_news}
    username: ${SPRING_DATASOURCE_USERNAME:openclaw_app}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

worker:
  base-url: ${WORKER_BASE_URL:http://localhost:13501}

api:
  read-protection-enabled: ${READ_API_PROTECTION_ENABLED:false}
  read-key: ${READ_API_KEY:}
  requests-per-minute: ${READ_API_REQUESTS_PER_MINUTE:60}

operations:
  collect-enabled: ${COLLECT_OPERATION_ENABLED:false}
  summary-enabled: ${SUMMARY_OPERATION_ENABLED:false}
  telegram-send-enabled: ${TELEGRAM_SEND_ENABLED:false}
  schedule-enabled: ${SCHEDULE_ENABLED:false}
  briefing-cron: ${BRIEFING_CRON:0 0 8 * * *}
  briefing-zone: ${BRIEFING_ZONE:Asia/Seoul}

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}
  max-attempts: ${TELEGRAM_MAX_ATTEMPTS:3}
