name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt
      - run: python -m pip install -r worker/requirements-dev.txt
      - run: python -m ruff check worker
      - run: python -m pytest worker -q

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
      - run: mvn -q -f backend/pom.xml test

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: POSTGRES_PASSWORD=ci-validation-only docker compose config --quiet
