services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "13532:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw_news}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-openclaw_app} -d ${POSTGRES_DB:-openclaw_news}"]
      interval: 5s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./worker
    ports:
      - "13501:8000"
    environment:
      COLLECT_EXTERNAL_ENABLED: "false"
      AI_SUMMARY_ENABLED: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "13510:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-openclaw_news}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-openclaw_app}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      WORKER_BASE_URL: http://worker:8000
      COLLECT_OPERATION_ENABLED: "false"
      TELEGRAM_SEND_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_healthy

volumes:
  postgres_data:
